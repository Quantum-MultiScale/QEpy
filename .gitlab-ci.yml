stages:
  - build
  - test
  - deploy

variables:
  PACKAGE: '/usr/local/lib/python3.9/site-packages'
  CONTAINER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
  QTAG: 'qe-7.2g'
  QTAGNEW: 'qepy-7.2g-dev'
  QEDIR: '/usr/src/app/q-e/'
  PUBLIC: 'package'

.build_rules: &build_rules
  rules:
    - if: $CI_COMMIT_BRANCH == "github"
      when: never
    - if: $CI_COMMIT_BRANCH == "action"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - "*.md"
        - "doc/**/*"
    - when: always
  image: $CONTAINER_IMAGE:$QTAG

build:
  stage: build
  <<: *build_rules
  script:
   - git submodule update --init --recursive
   - qedir=$QEDIR tddft=yes python -m pip install .
   - mkdir $PUBLIC
   - cd $PUBLIC
   - PACKAGE=$(python -c 'import qepy, os; print(os.path.split(qepy.__path__[0])[0])')
   - cp -r $PACKAGE/qepy* .
   - ls *

  artifacts:
    name: "QEpy-$CI_COMMIT_REF_SLUG-${CI_COMMIT_SHA::9}"
    paths:
      - $PUBLIC


test:
  stage: test
  <<: *build_rules
  script:
   - cp -r $PUBLIC/* $PACKAGE
   - cd examples/test
   - bash test.sh

test-mpi:
  stage: test
  <<: *build_rules
  script:
   - cp -r $PUBLIC/* $PACKAGE
   - cd examples/test
   - export MPIRUN="mpirun --allow-run-as-root --oversubscribe"
   - bash test.sh p

qe:
  stage: test
  only:
    - docker
  image: $CONTAINER_IMAGE:$QTAG
  script:
   - cp -r $PUBLIC/* $PACKAGE
   - cd examples/test/qe
   - bash test.sh


docker_image:
  stage: deploy
  only:
    - docker
  image: docker:stable
  services:
    - docker:dind

  variables:
    DOCKER_HOST: tcp://docker:2375

  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN registry.gitlab.com

  script:
    - docker pull $CONTAINER_IMAGE:$QTAG || true
    - docker run -t -d --name qepy_con $CONTAINER_IMAGE:$QTAG
    - docker cp $PUBLIC/qepy qepy_con:$PACKAGE
    - docker cp $PUBLIC/qepy-* qepy_con:$PACKAGE
    - docker commit qepy_con $CONTAINER_IMAGE:$QTAGNEW
    - docker push $CONTAINER_IMAGE:$QTAGNEW
